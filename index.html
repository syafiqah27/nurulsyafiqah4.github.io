
<!DOCTYPE html>
<html lang="en">
<head>
<title>Nurul Syafiqah | Personal Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(rgba(243, 217, 255, 0.7), rgba(243, 217, 255, 0.7)), 
                url('kinabalu.jpg');
    background-color: #f3d9ff;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-image: url('kinabalu.jpg');
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  .navbar {
    overflow: hidden;
    background-color: #c8aee0;
    width: 100%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .navbar a {
    float: left;
    display: block;
    color: #4a4a4a;
    text-align: center;
    padding: 18px 26px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
  }

  .navbar a.active {
    background-color: #d9c2ff;
    color: #5e4b8d;
  }

  .navbar a:hover {
    background-color: #e5c2ed;
    color: #000;
  }

  #datetime-box {
    position: absolute;
    top: 80px; 
    right: 20px;
    background-color: rgba(255, 255, 255, 0.8);
    padding: 13px 18px;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border: 1px solid #c8aee0;
    text-align: center;
    color: #5e4b8d;
    font-weight: bold;
    font-size: 1.0rem;
    z-index: 999;
  }

  #clock {
    font-size: 1.2rem;
    display: block;
    color: #000;
  }

  .content {
    padding: 60px 30px;
    text-align: center;
    color: #5e4b8d;
    background-color: rgba(255, 255, 255, 0.4);
    margin-top: 100px; 
    border-radius: 25px;
    backdrop-filter: blur(8px);
    max-width: 80%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.05);
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  h1 {
    font-family: 'Dancing Script', cursive; 
    font-size: 4.5rem; 
    margin: 0;
    font-weight: 700;
    color: #5e4b8d;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
  }

  p {
    font-size: 1.3rem;
    margin-top: 10px;
  }

  @media screen and (max-width: 600px) {
    #datetime-box {
      position: static;
      margin-top: 20px;
      width: fit-content;
    }
    .navbar a {
      float: none;
      width: 100%;
      text-align: left;
    }
    h1 {
      font-size: 3rem;
    }
  }
</style>
</head>
<body>

<div class="navbar">
  <a href="home.html" class="active">Home</a>
  <a href="about.html">About</a>
  <a href="education.html">Education</a>
  <a href="interest.html">Interest</a>
  <a href="gallery.html">Gallery</a>
  <a href="contact.html">Contact</a>
</div>

<div id="datetime-box">
  <span id="date"></span>
  <span id="clock">00:00:00</span>
</div>

<div class="content">
  <h1><marquee scrollamount="7" width="90%">Hello Everyone ♡</marquee></h1>
  <p>Welcome to my personal website for <strong>IML470 Individual Project</strong>.</p>
</div>

<script>
function updateDateTime() {
    const now = new Date();
    
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
    
    const options = { day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-GB', options);
}

setInterval(updateDateTime, 1000);
updateDateTime(); 
</script>

</body>
</html>
